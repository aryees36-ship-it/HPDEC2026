<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Promotion Division Evidence Summit Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7f8;
}

.card{
    border:none;
    border-radius:15px;
}

.header{
    background:#006b3f;
    color:white;
    border-radius:15px 15px 0 0;
    padding:25px;
}

.form-control,
.form-select{
    margin-bottom:15px;
}

.btn-success{
    background:#006b3f;
}

#loading{
    display:none;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card shadow">

<div class="header text-center">

<img src="logo.png" width="80" class="mb-3">

<h3>Health Promotion Division</h3>

<h5>Evidence Summit Registration</h5>

</div>

<div class="card-body">

<form id="registrationForm">

<h5 class="mb-3">Personal Information</h5>

<input
type="text"
class="form-control"
id="name"
placeholder="Full Name"
required>

<input
type="text"
class="form-control"
id="staffId"
placeholder="Staff ID">

<select
class="form-select"
id="gender"
required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>

<select
class="form-select"
id="agency"
required>

<option value="">Select Agency</option>

<option>GHS</option>

<option>CHAG</option>

<option>Health Training Institution</option>

<option>Quasi Government</option>

<option>Others</option>

</select>

<input
type="text"
class="form-control"
id="otherAgency"
placeholder="Specify Agency"
style="display:none;">

<input
type="text"
class="form-control"
id="department"
placeholder="Department / Division"
required>

<input
type="text"
class="form-control"
id="position"
placeholder="Cadre / Position"
required>

<h5 class="mt-4 mb-3">Location</h5>

<select
class="form-select"
id="region"
required>

<option value="">Select Region</option>

<option>Ahafo – Goaso</option>
<option>Ashanti – Kumasi</option>
<option>Bono – Sunyani</option>
<option>Bono East – Techiman</option>
<option>Central – Cape Coast</option>
<option>Eastern – Koforidua</option>
<option>Greater Accra – Accra</option>
<option>Northern – Tamale</option>
<option>North East – Nalerigu</option>
<option>Oti – Dambai</option>
<option>Savannah – Damongo</option>
<option>Upper East – Bolgatanga</option>
<option>Upper West – Wa</option>
<option>Volta – Ho</option>
<option>Western – Sekondi-Takoradi</option>
<option>Western North – Sefwi Wiawso</option>

</select>

<select
class="form-select"
id="district"
required>

<option value="">Select District</option>

</select>

<h5 class="mt-4 mb-3">Contact Information</h5>

<input
type="tel"
class="form-control"
id="phone"
placeholder="Phone Number"
required>

<input
type="email"
class="form-control"
id="email"
placeholder="Email Address"
required>

<h5 class="mt-4 mb-3">Payment Information</h5>

<select
class="form-select"
id="paymentDone"
required>

<option value="">Payment Completed?</option>

<option value="Yes">Yes</option>

<option value="No">No</option>

</select>

<div id="transactionBox" style="display:none;">

<input
type="text"
class="form-control"
id="transactionId"
placeholder="Transaction ID">

</div>

<div id="paymentProofBox" style="display:none;">

<input
type="file"
class="form-control"
id="paymentProof"
accept=".jpg,.jpeg,.png,.pdf">

</div>

<div class="d-grid mt-4">

<button
class="btn btn-success btn-lg"
id="submitBtn"
type="submit">

Register

</button>

</div>

<div
id="loading"
class="text-center mt-3">

<div class="spinner-border text-success"></div>

<p class="mt-2">

Submitting Registration...

</p>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- SUCCESS MODAL -->

<div
class="modal fade"
id="successModal"
tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header bg-success text-white">

<h5>

Registration Successful

</h5>

</div>

<div class="modal-body text-center">

<h5 id="s_name"></h5>

<p>

Department:
<b id="s_department"></b>

</p>

<p>

Position:
<b id="s_position"></b>

</p>

<p>

Region:
<b id="s_region"></b>

</p>

<p>

District:
<b id="s_district"></b>

</p>

<h4
class="text-success"
id="successText">

</h4>

<img
id="qrImage"
width="180">

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="downloadSlip()">

Download Slip

</button>

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Close

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="app.js"></script>

</body>
</html>
